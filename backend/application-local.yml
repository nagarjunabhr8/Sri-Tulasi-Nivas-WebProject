# Local development profile - uses Docker PostgreSQL with password auth
spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:sri_tulasi_nivas}?TimeZone=UTC
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002

jwt:
  secret: sri-tulasi-nivas-local-dev-secret-key-minimum-64-chars-required-for-hs512-algorithm

# Twilio WhatsApp — get credentials from https://console.twilio.com
# Residents must join the sandbox once: send "join <your-code>" to whatsapp:+14155238886
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
