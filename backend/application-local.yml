# Local development profile - H2 in-memory DB (no PostgreSQL required)
spring:
  datasource:
    url: jdbc:h2:mem:sri_tulasi_nivas;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=MONTH,YEAR,VALUE,KEY,CHECK,LEVEL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002

jwt:
  secret: sri-tulasi-nivas-local-dev-secret-key-minimum-64-chars-required-for-hs512-algorithm

# Twilio WhatsApp — get credentials from https://console.twilio.com
# Residents must join the sandbox once: send "join <your-code>" to whatsapp:+14155238886
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
