# Local development profile - H2 in-memory DB (no PostgreSQL required)
server:
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:h2:mem:sri_tulasi_nivas;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=MONTH,YEAR,VALUE,KEY,CHECK,LEVEL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cors:
  allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002

jwt:
  secret: sri-tulasi-nivas-local-dev-secret-key-minimum-64-chars-required-for-hs512-algorithm
  expiration: 86400000
  refresh-expiration: 604800000

stripe:
  api-key: sk_test_placeholder

app:
  frontend-url: http://localhost:3000

# ─── WhatsApp via Twilio ───────────────────────────────────────────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
